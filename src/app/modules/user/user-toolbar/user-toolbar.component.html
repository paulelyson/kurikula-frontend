<div class="toolbar-container">
  <div class="badge-wrapper">
    @for (filter of filters; track filter.field) {
      @if (filter.show) {
        <app-badge [hasCloseIcon]="filter.canClose" size="sm" (closed)="onFilterClose(filter)">{{ filter.value }} </app-badge>
      }
    }
  </div>
  <span style="flex: 1"></span>
  <app-input suffix_icon="search" placeholder="Name" [formControl]="searchControl" />
</div>
