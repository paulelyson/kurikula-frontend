<div class="toolbar-container">
  <div class="badge-wrapper">
    @for (filter of filters; track filter.field) {
      <app-badge [hasCloseIcon]="true">{{ filter.value }} </app-badge>
    }
  </div>
  <span style="flex: 1"></span>
  <app-input suffix_icon="search" placeholder="Course Name" [formControl]="searchControl" />
</div>
